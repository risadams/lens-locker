# cargo-deny config — the automated backstop for LumenVault's zero-network
# guarantee. Per workplan/SPEC.md §8.2: bans network crates transitively.
# Run via `cargo deny check`. This is layer 2 of 4 in the offline-enforcement
# checklist (see §8) — the others (WebView2 COM settings, WFP audit, firewall
# rule) are not cargo-deny's job.

[advisories]
ignore = [
    # Deep in tauri-utils' own dependency chain (urlpattern -> unic-ucd-ident
    # -> unic-ucd-version -> unic-char-property/-range/-common), not
    # something LumenVault can fix by changing its own code. No safe upgrade
    # exists per the advisories themselves. Revisit when Tauri drops its
    # urlpattern dependency or migrates off the unmaintained unic-* crates.
    { id = "RUSTSEC-2025-0081", reason = "transitive via tauri-utils' urlpattern dep; no safe upgrade available" },
    { id = "RUSTSEC-2025-0075", reason = "transitive via tauri-utils' urlpattern dep; no safe upgrade available" },
    { id = "RUSTSEC-2025-0080", reason = "transitive via tauri-utils' urlpattern dep; no safe upgrade available" },
    { id = "RUSTSEC-2025-0100", reason = "transitive via tauri-utils' urlpattern dep; no safe upgrade available" },
    { id = "RUSTSEC-2025-0098", reason = "transitive via tauri-utils' urlpattern dep; no safe upgrade available" },
]

[graph]
all-features = true
# v1 is Windows-only (workplan/SPEC.md §2/§4) — restrict the graph to the
# actual shipping target. Without this, cargo-deny evaluates Tauri's
# mobile-target dependencies too (Android/iOS pull in reqwest+hyper for
# their own asset loading, entirely absent from a Windows build) and the
# ban list would be checking a graph LumenVault never actually links.
targets = ["x86_64-pc-windows-msvc"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

deny = [
    # HTTP clients
    { crate = "reqwest" },
    { crate = "hyper" },
    { crate = "hyper-util" },
    { crate = "ureq" },
    { crate = "curl" },
    { crate = "curl-sys" },
    { crate = "isahc" },
    { crate = "surf" },
    { crate = "attohttpc" },
    # Lower-level networking — nothing in LumenVault's own stack needs raw
    # sockets; if a future dependency legitimately does, add it here with a
    # `reason` rather than silently allowing the ban to lapse.
    { crate = "mio" },
    { crate = "socket2" },
    { crate = "async-std" },
    # Analytics / telemetry-shaped crates, in case anything pulls one in transitively
    { crate = "sentry" },
    { crate = "posthog-rs" },
]

# tokio itself is not banned outright above (many crates pull in tokio for its
# non-network runtime/async primitives, e.g. the Tauri stack) — but its `net`
# feature specifically is what actually opens sockets. Deny that feature.
[[bans.features]]
crate = "tokio"
deny = ["net"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    # jpegxl-rs/jpegxl-sys (workplan/tickets/009, 021, Milestone 2's JPEG XL
    # conversion path) — acceptable per this project's personal-use-only
    # scope (workplan/SPEC.md §1), not a project-wide obligation. Confirmed
    # exact SPDX identifier via `cargo deny check`'s own rejection message
    # rather than assumed.
    "GPL-3.0-or-later",
]

[licenses.private]
# LumenVault's own crates are `publish = false` (workspace.package) — personal,
# never published. Don't demand an SPDX license field on our own code.
ignore = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
